name: Update Spam Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and Merge Lists
        run: |
          mkdir sources
          
          # Источник 1
          curl -s "https://raw.githubusercontent.com/ahadik/spam-numbers/main/spam.csv" > sources/src1.txt || true
          
          # Источник 2
          curl -s "https://raw.githubusercontent.com/pmarques/spam-numbers/main/numbers.txt" > sources/src2.txt || true
          
          # Твой файл (чтобы сохранить старые номера)
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/spam-numbers.txt" > sources/mylist.txt || true
          
          # Объединяем
          cat sources/*.txt > combined.txt
          
          # Оставляем только номера (10-15 цифр), убираем дубли, заменяем 8 на +7
          grep -oP '\+?\d{10,15}' combined.txt | \
          sed 's/^8/+7/' | \
          sort -u > spam-numbers.txt
          
          echo "Numbers: $(wc -l < spam-numbers.txt)"

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"
          
          if ! git diff --quiet spam-numbers.txt; then
            git add spam-numbers.txt
            git commit -m "Auto-update: $(date '+%Y-%m-%d')"
            git push
            echo "Updated!"
          else
            echo "No changes."
          fi
