name: Clean Spam Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Clean and Sort
        run: |
          # Просто чистим твой файл: убираем дубли, сортируем, заменяем 8 на +7
          grep -oP '\+?\d{10,15}' spam-numbers.txt | \
          sed 's/^8/+7/' | \
          sort -u > temp.txt
          
          mv temp.txt spam-numbers.txt
          
          echo "✅ Total: $(wc -l < spam-numbers.txt) numbers"

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if ! git diff --quiet spam-numbers.txt; then
            git add spam-numbers.txt
            git commit -m "Cleaned numbers"
            git push
          fi
